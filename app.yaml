runtime: nodejs22
env: standard

instance_class: F1  # smallest/cost-effective

automatic_scaling:
  min_instances: 1
  max_instances: 1

entrypoint: node src/server.js

# ─────────────────────────────────────────────────────────────
#  NO SECRETS HERE. This file is safe to commit.
#  All secrets are loaded at runtime from Google Secret Manager
#  (see src/config/loadSecrets.js). NODE_ENV=production is what
#  tells the app to use Secret Manager instead of a local .env.
# ─────────────────────────────────────────────────────────────
env_variables:
  NODE_ENV: "production"
